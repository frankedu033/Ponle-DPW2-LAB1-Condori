<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<!-- Bootstrap -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

/* Sidebar */
.sidebar{
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

/* Links */
.sidebar a{
color:white;
display:block;
margin:10px 0;
text-decoration:none;
}

.sidebar a:hover{
background:#495057;
padding-left:10px;
}

/* Contenido */
.content{
padding:20px;
background:#f8f9fa;
height:100vh;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 col-lg-2 sidebar">
<h4>Panel Admin</h4>

<a href="#">Inicio</a>
<a href="#">Usuarios</a>
<a href="#">Reportes</a>
<a href="#">Configuración</a>
</div>

<!-- CONTENIDO -->
<div class="col-md-9 col-lg-10 content">

<h2>Dashboard</h2>
<p>Bienvenido al sistema administrativo</p>

<div class="row">

<div class="col-md-4">
<div class="card p-3">
<h5>Usuarios</h5>
<p>120 registrados</p>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Ventas</h5>
<p>$3,200</p>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Visitas</h5>
<p>1,500 hoy</p>
</div>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
